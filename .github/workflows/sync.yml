name: Sync CFBD data to Google Sheets

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 6am ET daily
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year (leave blank to sync both 2025 and 2026)'
        required: false
        default: ''
      tabs:
        description: 'Comma-separated tabs to sync (default: all)'
        required: false
        default: 'teams,games,advanced_stats,power_ratings'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Sync 2025 data
        if: ${{ github.event.inputs.year == '' || github.event.inputs.year == '2025' }}
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          npx tsx scripts/sync-cfbd.ts \
            --year=2025 \
            --tabs=${{ github.event.inputs.tabs || 'teams,games,advanced_stats,power_ratings' }}

      - name: Sync 2026 games
        if: ${{ github.event.inputs.year == '' || github.event.inputs.year == '2026' }}
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          npx tsx scripts/sync-cfbd.ts \
            --year=2026 \
            --tabs=games