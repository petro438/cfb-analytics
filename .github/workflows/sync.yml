name: Sync CFBD data to Google Sheets

on:
  schedule:
    # Runs every day at 6am ET during season (Sep-Jan), weekly otherwise
    - cron: '0 10 * * *'   # 10:00 UTC = 6am ET
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI
    inputs:
      year:
        description: 'Season year (default: 2025)'
        required: false
        default: '2025'
      tabs:
        description: 'Comma-separated tabs to sync (default: all)'
        required: false
        default: 'games,advanced_stats,power_ratings'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run sync script
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          npx tsx scripts/sync-cfbd.ts \
            --year=${{ github.event.inputs.year || '2025' }} \
            --tabs=${{ github.event.inputs.tabs || 'games,advanced_stats,power_ratings' }}
